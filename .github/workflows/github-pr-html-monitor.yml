name: GitHub PR HTML Monitor

on:
  schedule:
    - cron: "19 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  MONITOR_OWNER: cli
  MONITOR_REPO: cli
  ISSUE_TITLE: GitHub PR HTML monitor failure

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Check GitHub PR HTML selectors
        id: monitor
        continue-on-error: true
        shell: bash
        run: |
          bun check-github-pr-html.ts 2>&1 | tee monitor-output.txt
          exit ${PIPESTATUS[0]}
      - name: Open or update issue on failure
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs")

            const issueTitle = process.env.ISSUE_TITLE
            const issueBody = [
              `The scheduled HTML monitor failed for \`${process.env.MONITOR_OWNER}/${process.env.MONITOR_REPO}\`.`,
              "",
              "```text",
              fs.readFileSync("monitor-output.txt", "utf8").trim(),
              "```",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n")

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            })

            const existingIssue = issues.find((issue) => issue.title === issueTitle)

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody,
              })
              core.info(`Updated existing issue #${existingIssue.number}`)
              return
            }

            const { data: newIssue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
            })

            core.info(`Opened issue #${newIssue.number}`)
