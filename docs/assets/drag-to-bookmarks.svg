<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Drag bookmarklet to bookmarks bar</title>
  <desc id="desc">A browser window mockup with an arrow showing the bookmarklet button being dragged into the bookmarks bar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#f4dfc7"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bb4d00"/>
      <stop offset="100%" stop-color="#dc6b15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7a5325" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="760" height="520" rx="36" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="54" y="58" width="652" height="384" rx="24" fill="#fffdfa"/>
    <rect x="54" y="58" width="652" height="52" rx="24" fill="#ead7be"/>
    <rect x="54" y="90" width="652" height="52" fill="#f4eadb"/>
    <circle cx="96" cy="84" r="7" fill="#d47e5b"/>
    <circle cx="120" cy="84" r="7" fill="#d1ae6a"/>
    <circle cx="144" cy="84" r="7" fill="#7ea07a"/>
    <rect x="182" y="73" width="360" height="22" rx="11" fill="#fff8ef"/>
    <rect x="88" y="103" width="114" height="24" rx="12" fill="url(#bar)"/>
    <text x="145" y="119" text-anchor="middle" font-family="Avenir Next, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff7f0">Bookmarks bar</text>
    <rect x="94" y="164" width="572" height="220" rx="22" fill="#f8f0e5"/>
    <rect x="124" y="198" width="250" height="24" rx="12" fill="#ead7be"/>
    <rect x="124" y="238" width="478" height="16" rx="8" fill="#e7dccb"/>
    <rect x="124" y="266" width="410" height="16" rx="8" fill="#e7dccb"/>
    <rect x="124" y="294" width="452" height="16" rx="8" fill="#e7dccb"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="238" y="388" width="280" height="64" rx="32" fill="url(#bar)"/>
    <text x="378" y="427" text-anchor="middle" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#fff9f4">GitHub PR Slack Copy</text>
  </g>

  <path d="M378 376 C378 318, 320 260, 220 184" fill="none" stroke="#bb4d00" stroke-width="10" stroke-linecap="round" stroke-dasharray="14 18"/>
  <path d="M216 170 L188 188 L221 197" fill="none" stroke="#bb4d00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="428" y="190" width="226" height="86" rx="20" fill="#fff7ed" stroke="#d9b992" stroke-width="2"/>
    <text x="541" y="224" text-anchor="middle" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#7b3a09">Hey, drag this up here</text>
    <text x="541" y="252" text-anchor="middle" font-family="Avenir Next, Segoe UI, sans-serif" font-size="16" fill="#805b36">to the bookmarks bar</text>
  </g>
</svg>
